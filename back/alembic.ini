# alembic.ini — Configuration Alembic pour MIABO Backend
# L'URL de connexion est injectée dynamiquement depuis .env dans env.py
# (ne pas renseigner sqlalchemy.url ici pour éviter les secrets en clair)

[alembic]
# Chemin vers le dossier des scripts de migration
script_location = alembic

# Répertoire des fichiers de migration versionnés
version_locations = %(here)s/alembic/versions

# Format du nom de fichier de migration généré
file_template = %%(rev)s_%%(slug)s

# Encodage des fichiers de migration
prepend_sys_path = .

# Timezone pour les horodatages dans les migrations
timezone = UTC

# Longueur maximale du slug dans le nom de fichier
truncate_slug_length = 40

# Active la comparaison de types pour l'autogenerate
[alembic:compare_type]
# Comparer les types de colonnes lors de l'autogenerate
compare_type = true

[post_write_hooks]
# Formater automatiquement les migrations avec black (optionnel)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

# Configuration des logs Alembic
[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
